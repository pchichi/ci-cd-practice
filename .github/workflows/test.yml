name: Run Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # ✅ 1. 필요한 모든 라이브러리 설치 (flask, selenium 추가)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest flask selenium webdriver-manager

    # ✅ 2. Flask 서버를 백그라운드에서 실행 (서버가 떠 있어야 테스트 가능)
    - name: Run Flask in Background
      run: |
        python app.py & 
        sleep 5  # 서버가 뜰 때까지 5초 대기

    # ✅ 3. 테스트 실행
    - name: Run tests
      env:
        IS_CI: "true"  # 👈 "지금 CI 서버에서 도는 중이야"라고 표시를 남김
      run: pytest test_login.py

    # 테스트 실패 여부와 상관없이(always) 실행하며, 
    # screenshots 폴더가 있으면 깃허브 서버로 업로드합니다.
    - name: Upload Screenshot
      uses: actions/upload-artifact@v4
      if: always() # 테스트가 실패해도 이 스텝은 실행함
      with:
        name: selenium-screenshots
        path: screenshots/*.png

    - name: Slack Notification
      uses: rtCamp/action-slack-notify@v2
      if: always() # 테스트 성공/실패 여부와 상관없이 무조건 알림을 보냅니다.
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }} #금고에서 주소 가져옴
        SLACK_CHANNEL: test-report
        SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
        SLACK_TITLE: "QA Automation Test Report"
        SLACK_MESSAGE: "테스트 결과가 도착했습니다. 결과: ${{ job.status }}"
        SLACK_USERNAME: "CI/CD QA_BOT"