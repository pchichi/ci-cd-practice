name: Run Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # ✅ 1. 필요한 모든 라이브러리 설치 (flask, selenium 추가)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest flask selenium webdriver-manager

    # ✅ 2. Flask 서버를 백그라운드에서 실행 (서버가 떠 있어야 테스트 가능)
    - name: Run Flask in Background
      run: |
        python app.py & 
        sleep 5  # 서버가 뜰 때까지 5초 대기

    # ✅ 3. 테스트 실행
    - name: Run tests
      run: pytest test_login.py