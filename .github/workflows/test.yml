name: Ultimate Multi-OS QA Report

on: [push]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # 1단계: 각 OS에서 테스트 실행 및 결과 업로드
  test:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt --quiet


      - name: Run Pytest
      env:
        IS_CI: "true"
      # [수정] 현재 작업 공간의 절대 경로 아래에 결과를 담으라고 명시합니다.
      run: pytest test_login.py --alluredir=${{ github.workspace }}/allure-results || true

    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.os }}
        # [수정] 업로드할 때도 절대 경로를 콕 집어줍니다.
        path: ${{ github.workspace }}/allure-results
        if-no-files-found: error # 만약 이번에도 못 찾으면 아예 에러를 내서 범인을 잡읍시다.
        
    # - name: Run Pytest
    #   env:
    #     IS_CI: "true"
    #   # [변경점 1] 명령어 끝에 || true를 붙여서 깃허브 액션을 안심시킵니다.
    #   run: pytest test_login.py --alluredir=allure-results-${{ matrix.os }} || true

    # - name: Upload Allure Results
    #   # [변경점 2] if: always()를 추가해서 앞 단계가 실패해도 무조건 실행하게 합니다.
    #   if: always() 
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: allure-results-${{ matrix.os }}
    #     path: allure-results-${{ matrix.os }}
    #     retention-days: 1

  # 2단계: 결과 통합 및 웹 리포트 배포
  report:
    needs: test # test 작업이 모두 끝나야 실행됩니다.
    runs-on: ubuntu-latest
    if: always() # 테스트가 실패해도 리포트는 생성합니다.
    
    steps:
    - uses: actions/checkout@v4

    - name: Download All Results
      uses: actions/download-artifact@v4
      with:
        path: all-results
        pattern: allure-results-*
        merge-multiple: true

    - name: Load Allure History
      uses: actions/checkout@v4
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Build Combined Report
      uses: simple-elf/allure-report-action@master
      with:
        allure_results: all-results
        allure_history: allure-history
        keep_reports: 20

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
        force_orphan: true

    - name: Slack Notification
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: |
          {
            "attachments": [
              {
                "color": "#36a64f",
                "pretext": "📊 *QA Automation Dashboard Ready*",
                "title": "통합 Allure 리포트 확인하기",
                "title_link": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/",
                "text": "윈도우 및 리눅스 환경의 테스트 결과가 하나로 통합되었습니다.\n위 링크를 눌러 상세 대시보드를 확인하세요.",
                "footer": "GitHub Actions QA Bot"
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK