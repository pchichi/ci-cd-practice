name: Multi-OS Automation Test

on: [push]

jobs:
  test:
    # 윈도우 설치 지연을 대비한 넉넉한 타임아웃
    timeout-minutes: 30
    strategy:
      # 핵심: 우분투가 실패해도 윈도우는 멈추지 않고 끝까지 실행됨
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt --quiet --no-progress
      shell: bash

    # --- 서버 실행 구간 (OS별 최적화) ---
    - name: Start Flask Server (Windows)
      if: runner.os == 'Windows'
      run: Start-Process python -ArgumentList "app.py"
      shell: pwsh

    - name: Start Flask Server (Linux)
      if: runner.os == 'Linux'
      run: python app.py &
      shell: bash

    # 서버가 안정적으로 부팅될 때까지 대기 (공통)
    - name: Wait for Server
      run: sleep 15
      shell: bash

    # --- 테스트 실행 (파일명/경로를 꼭 확인하세요!) ---
    - name: Run Pytest
      env:
        IS_CI: "true"
      # 만약 test_login.py가 tests 폴더 안에 있다면 tests/test_login.py로 수정!
      run: pytest test_login.py

    - name: Upload Screenshot
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: screenshots-${{ matrix.os }}
        path: screenshots/*.png

    - name: Slack Notification
      uses: slackapi/slack-github-action@v1.24.0
      if: always()
      with:
        payload: |
          {
            "text": "QA Report (${{ matrix.os }}): ${{ job.status }}\n${{ matrix.os }} 환경 테스트 완료!",
            "attachments": [
              {
                "color": "${{ job.status == 'success' && '#36a64f' || '#ff0000' }}",
                "title": "GitHub Actions 결과 확인",
                "title_link": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK