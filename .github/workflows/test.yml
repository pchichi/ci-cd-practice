name: Multi-OS Automation Test

on: [push]

jobs:
  test:
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt --quiet --no-progress
      shell: bash

    - name: Start Flask Server (Windows)
      if: runner.os == 'Windows'
      run: Start-Process python -ArgumentList "app.py"
      shell: pwsh

    - name: Wait for Windows Server
      if: runner.os == 'Windows'
      run: Start-Sleep -s 20
      shell: pwsh

    - name: Start Flask Server (Linux)
      if: runner.os == 'Linux'
      run: |
        python app.py &
        sleep 10
      shell: bash

    - name: Run Pytest
      env:
        IS_CI: "true"
      run: pytest test_login.py

    - name: Upload Screenshot
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: screenshots-${{ matrix.os }}
        path: screenshots/*.png

    - name: Slack Notification
      uses: slackapi/slack-github-action@v1.24.0
      if: always()
      with:
        payload: |
          {
            "text": "QA Report (${{ matrix.os }}): ${{ job.status }}\n${{ matrix.os }} 환경 테스트 완료!",
            "attachments": [
              {
                "color": "${{ job.status == 'success' && '#36a64f' || '#ff0000' }}",
                "title": "GitHub Actions 결과 확인",
                "title_link": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK